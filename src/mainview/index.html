<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exodus</title>
    <style>
      #splash {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at 50% 50%, #1c1917 0%, #0a0a0a 100%);
        color: #fafaf9;
        z-index: 9999;
        transition: opacity 0.3s ease;
        overflow: hidden;
      }
      #splash::before {
        content: '';
        position: absolute;
        inset: -50%;
        background: radial-gradient(circle at 30% 30%, rgba(245, 158, 11, 0.12) 0%, transparent 50%),
                    radial-gradient(circle at 70% 70%, rgba(120, 113, 108, 0.08) 0%, transparent 50%);
        animation: splashPulse 4s ease-in-out infinite;
      }
      @keyframes splashPulse {
        0%, 100% { transform: scale(1) rotate(0deg); opacity: 0.8; }
        50% { transform: scale(1.1) rotate(3deg); opacity: 1; }
      }
      #splash.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      #splash h1 {
        position: relative;
        z-index: 1;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 1.75rem;
        font-weight: 500;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        animation: splashFadeIn 0.6s ease-out;
      }
      #splash h1::after {
        content: '';
        position: absolute;
        left: 50%;
        bottom: -8px;
        width: 24px;
        height: 2px;
        background: rgba(245, 158, 11, 0.6);
        transform: translateX(-50%);
        animation: splashLine 0.8s ease-out 0.3s both;
      }
      @keyframes splashFadeIn {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes splashLine {
        from { width: 0; opacity: 0; }
        to { width: 24px; opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <h1>Exodus</h1>
    </div>
    <div id="app" class="isolate"></div>
    <script type="module" src="/main.ts"></script>
  </body>
</html>
