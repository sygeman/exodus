meta:
  level: L1
  type: design
  id: exodus-design-control
  derives_from: exodus-vision

ideas:
  - id: D-CONTROL-OVERVIEW
    type: component
    text: Control Layer — планирование и оркестрация изменений
    implements: [V-02, V-06]
    part_of: D-LAYER-CONTROL

  - id: D-CONTROL-COMP-01
    type: component
    text: Декомпозиция Intent на каскад уровней
    part_of: D-CONTROL-OVERVIEW

  - id: D-CONTROL-COMP-02
    type: component
    text: Управление жизненным циклом Tasks
    part_of: D-CONTROL-OVERVIEW

  - id: D-CONTROL-COMP-03
    type: component
    text: Git workflow (ветки, коммиты, merge)
    part_of: D-CONTROL-OVERVIEW

  - id: D-CONTROL-COMP-04
    type: component
    text: Запуск Execution с ограниченным контекстом
    part_of: D-CONTROL-OVERVIEW

  - id: D-CONTROL-INPUT
    type: component
    text: Input — Stabilized Intent от Intent Layer, формат yaml
    part_of: D-CONTROL-OVERVIEW

  - id: D-CONTROL-OUTPUT
    type: component
    text: Output — Task + Snapshot → Execution, формат yaml
    part_of: D-CONTROL-OVERVIEW

  - id: D-CONTROL-COMP-ACSD
    type: component
    text: ACSD Engine — каскадная детализация от Vision до Implementation
    part_of: D-CONTROL-OVERVIEW
    implements: V-02

  - id: D-CONTROL-COMP-ACSD-L0
    type: component
    text: L0 — Vision
    part_of: D-CONTROL-COMP-ACSD

  - id: D-CONTROL-COMP-ACSD-L1
    type: component
    text: L1 — Design
    part_of: D-CONTROL-COMP-ACSD
    requires: [D-CONTROL-COMP-ACSD-L0]

  - id: D-CONTROL-COMP-ACSD-L2
    type: component
    text: L2 — Specification
    part_of: D-CONTROL-COMP-ACSD
    requires: [D-CONTROL-COMP-ACSD-L1]

  - id: D-CONTROL-COMP-ACSD-L3
    type: component
    text: L3 — Implementation
    part_of: D-CONTROL-COMP-ACSD
    requires: [D-CONTROL-COMP-ACSD-L2]

  - id: D-CONTROL-COMP-TASK
    type: component
    text: Task Manager — управление жизненным циклом задач
    part_of: D-CONTROL-OVERVIEW

  - id: D-CONTROL-TASK-STATE-DRAFT
    type: component
    text: draft — задача создана
    part_of: D-CONTROL-COMP-TASK

  - id: D-CONTROL-TASK-STATE-ACTIVE
    type: component
    text: active — задача активирована
    part_of: D-CONTROL-COMP-TASK
    requires: [D-CONTROL-TASK-STATE-DRAFT]

  - id: D-CONTROL-TASK-STATE-PROGRESS
    type: component
    text: in_progress — задача в работе
    part_of: D-CONTROL-COMP-TASK
    requires: [D-CONTROL-TASK-STATE-ACTIVE]

  - id: D-CONTROL-TASK-STATE-STABILIZED
    type: component
    text: stabilized — задача стабилизирована
    part_of: D-CONTROL-COMP-TASK
    requires: [D-CONTROL-TASK-STATE-PROGRESS]

  - id: D-CONTROL-TASK-STATE-MERGED
    type: component
    text: merged — задача влита
    part_of: D-CONTROL-COMP-TASK
    requires: [D-CONTROL-TASK-STATE-STABILIZED]

  - id: D-CONTROL-TASK-STATE-CLOSED
    type: component
    text: closed — задача закрыта
    part_of: D-CONTROL-COMP-TASK

  - id: D-CONTROL-COMP-GIT
    type: component
    text: Git Workflow — управление ветками и коммитами, trunk-based flow
    part_of: D-CONTROL-OVERVIEW
