meta:
  level: L1
  type: design
  id: exodus-design
  derives_from: exodus-vision

ideas:
  - id: D-OVERVIEW
    type: component
    text: Exodus — система из 6 изолированных слоёв с чёткими границами и однонаправленным потоком данных. Каждый слой имеет одну ответственность и взаимодействует только со смежными слоями.
    implements: V-PURPOSE

  - id: D-LAYER-INTENT
    type: component
    text: Intent Layer — интерпретация смысла и стабилизация намерений
    part_of: D-OVERVIEW
    implements: V-01

  - id: D-LAYER-CONTROL
    type: component
    text: Control Layer — планирование и оркестрация изменений через Exodus Cascade
    part_of: D-OVERVIEW
    implements: [V-02, V-CASCADE]
    requires: [D-LAYER-INTENT]

  - id: D-LAYER-CASCADE
    type: component
    text: Exodus Cascade Engine — парсинг, валидация и управление каскадом уровней
    part_of: D-LAYER-CONTROL
    implements: V-CASCADE

  - id: D-LAYER-EXECUTION
    type: component
    text: Execution Layer — изолированное выполнение задач
    part_of: D-OVERVIEW
    implements: V-03
    requires: [D-LAYER-CONTROL]

  - id: D-LAYER-STATE
    type: component
    text: State Layer — хранение и версионирование состояния
    part_of: D-OVERVIEW
    implements: [V-04, V-05]
    requires: [D-LAYER-EXECUTION]

  - id: D-LAYER-UI
    type: component
    text: UI Layer — единый интерфейс взаимодействия
    part_of: D-OVERVIEW
    implements: SC-01

  - id: D-LAYER-INFRA
    type: component
    text: Infra Layer — инфраструктура runtime
    part_of: D-OVERVIEW
    supports: [D-LAYER-EXECUTION, D-LAYER-STATE]

  - id: D-FLOW-01
    type: component
    text: User → UI — намерения, обратная связь
    part_of: D-OVERVIEW

  - id: D-FLOW-02
    type: component
    text: UI → Intent — пользовательский ввод
    part_of: D-OVERVIEW
    supports: [D-LAYER-INTENT]

  - id: D-FLOW-03
    type: component
    text: Intent → Control — Stabilized Intent
    part_of: D-OVERVIEW
    supports: [D-LAYER-CONTROL]

  - id: D-FLOW-04
    type: component
    text: Control → Execution — Task + Snapshot + Skills
    part_of: D-OVERVIEW
    supports: [D-LAYER-EXECUTION]

  - id: D-FLOW-05
    type: component
    text: Execution → State — Diff + Artifacts
    part_of: D-OVERVIEW
    supports: [D-LAYER-STATE]

  - id: D-FLOW-06
    type: component
    text: State → Control — снапшоты, история
    part_of: D-OVERVIEW

  - id: D-FLOW-07
    type: component
    text: Control → UI — планы, статус, результаты
    part_of: D-OVERVIEW

  - id: DP-01
    type: principle
    text: Однонаправленный поток — данные текут Intent → Control → Execution → State
    supports: [D-FLOW-02, D-FLOW-03, D-FLOW-04, D-FLOW-05]

  - id: DP-02
    type: principle
    text: Изоляция слоёв — каждый слой знает только о смежных
    supports: [D-LAYER-INTENT, D-LAYER-CONTROL, D-LAYER-EXECUTION, D-LAYER-STATE]

  - id: DP-03
    type: principle
    text: Stateless Execution — Execution не хранит состояние между запусками
    supports: [D-LAYER-EXECUTION]

  - id: DP-04
    type: principle
    text: Git как единственный источник — вся история в git
    supports: [D-LAYER-STATE]

  - id: DP-05
    type: principle
    text: Трассируемость — любое изменение можно отследить до Intent
    supports: [D-FLOW-03, D-FLOW-04, D-FLOW-05]

  - id: D-CONSTRAINT-01
    type: constraint
    text: Execution не может напрямую изменить State
    supports: [DP-02, INV-03]

  - id: D-CONSTRAINT-02
    type: constraint
    text: Execution не может получить доступ к Control
    supports: [DP-02, INV-03]

  - id: D-CONSTRAINT-03
    type: constraint
    text: Control не может интерпретировать сырой ввод (только Intent)
    supports: [DP-01, INV-01]

  - id: D-CONSTRAINT-04
    type: constraint
    text: Изменение на уровне N требует пересборки N+1
    supports: [INV-06]

  - id: D-LAYER-CASCADE-FILES
    type: component
    text: Файлы Exodus Cascade — design/cascade.yaml, specification/cascade.yaml, contract/cascade.yaml, code/cascade.yaml
    part_of: D-LAYER-CASCADE
