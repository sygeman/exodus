meta:
  level: L2
  type: specification
  id: exodus-spec-cascade
  derives_from: exodus-design-cascade
  status: draft
  created: "2025-04-05"

ideas:
  - id: S-CASCADE-OVERVIEW
    type: component
    text: Спецификация Exodus Cascade Engine — система парсинга, валидации и управления каскадом
    implements: D-CASCADE-OVERVIEW

  - id: S-CASCADE-PARSER
    type: component
    text: YAML Parser — чтение YAML файлов, извлечение meta и ideas
    part_of: S-CASCADE-OVERVIEW

  - id: S-CASCADE-PARSER-FUNC-1
    type: goal
    text: Парсить meta.level (L0, L1, L2, L3, L4)
    part_of: S-CASCADE-PARSER

  - id: S-CASCADE-PARSER-FUNC-2
    type: goal
    text: Парсить meta.type (vision, design, specification, contract, code)
    part_of: S-CASCADE-PARSER

  - id: S-CASCADE-PARSER-FUNC-3
    type: goal
    text: Парсить meta.id (уникальный идентификатор файла)
    part_of: S-CASCADE-PARSER

  - id: S-CASCADE-PARSER-FUNC-4
    type: goal
    text: Парсить meta.derives_from (ссылка на родительский файл)
    part_of: S-CASCADE-PARSER

  - id: S-CASCADE-PARSER-FUNC-5
    type: goal
    text: Парсить ideas[] — массив идей с id, type, text
    part_of: S-CASCADE-PARSER

  - id: S-CASCADE-PARSER-FUNC-6
    type: goal
    text: Парсить связи ideas (implements, requires, part_of, supports, contradicts)
    part_of: S-CASCADE-PARSER

  - id: S-CASCADE-GRAPH-BUILDER
    type: component
    text: Graph Builder — построение графа зависимостей между идеями
    part_of: S-CASCADE-OVERVIEW

  - id: S-CASCADE-GRAPH-FUNC-1
    type: goal
    text: Создавать узлы для каждой идеи (id, type, text, level)
    part_of: S-CASCADE-GRAPH-BUILDER

  - id: S-CASCADE-GRAPH-FUNC-2
    type: goal
    text: Создавать рёбра для каждой связи (source → target, type)
    part_of: S-CASCADE-GRAPH-BUILDER

  - id: S-CASCADE-GRAPH-FUNC-3
    type: goal
    text: Индексировать идеи по id для быстрого поиска
    part_of: S-CASCADE-GRAPH-BUILDER

  - id: S-CASCADE-GRAPH-FUNC-4
    type: goal
    text: Поддерживать обход графа вверх (к L0) и вниз (к L4)
    part_of: S-CASCADE-GRAPH-BUILDER

  - id: S-CASCADE-VALIDATOR-PHASE-1
    type: component
    text: Validator Phase 1 — механическая валидация целостности графа
    part_of: S-CASCADE-OVERVIEW

  - id: S-CASCADE-V1-FUNC-1
    type: goal
    text: Проверять уникальность id идей (нет дубликатов)
    part_of: S-CASCADE-VALIDATOR-PHASE-1

  - id: S-CASCADE-V1-FUNC-2
    type: goal
    text: Проверять существование целевых узлов для всех связей (нет висячих ссылок)
    part_of: S-CASCADE-VALIDATOR-PHASE-1

  - id: S-CASCADE-V1-FUNC-3
    type: goal
    text: Проверять отсутствие циклов в графе
    part_of: S-CASCADE-VALIDATOR-PHASE-1

  - id: S-CASCADE-V1-FUNC-4
    type: goal
    text: Проверять что каждая идея имеет хотя бы одну связь (кроме L0 root)
    part_of: S-CASCADE-VALIDATOR-PHASE-1

  - id: S-CASCADE-V1-FUNC-5
    type: goal
    text: Проверять что идеи L0 не имеют implements (только supports/part_of)
    part_of: S-CASCADE-VALIDATOR-PHASE-1

  - id: S-CASCADE-V1-FUNC-6
    type: goal
    text: Проверять что идеи N уровня ссылаются только на N-1 или N
    part_of: S-CASCADE-VALIDATOR-PHASE-1

  - id: S-CASCADE-V1-FUNC-7
    type: goal
    text: Проверять типы идей (только 7 разрешённых типов)
    part_of: S-CASCADE-VALIDATOR-PHASE-1

  - id: S-CASCADE-V1-FUNC-8
    type: goal
    text: Проверять типы связей (только 5 разрешённых типов)
    part_of: S-CASCADE-VALIDATOR-PHASE-1

  - id: S-CASCADE-V1-FUNC-9
    type: goal
    text: Проверять структуру decision (alternatives, selected, rejected_because)
    part_of: S-CASCADE-VALIDATOR-PHASE-1

  - id: S-CASCADE-V1-FUNC-10
    type: goal
    text: Проверять что component имеет part_of или содержит другие компоненты
    part_of: S-CASCADE-VALIDATOR-PHASE-1

  - id: S-CASCADE-VALIDATOR-PHASE-2
    type: component
    text: Validator Phase 2 — LLM семантическая валидация
    part_of: S-CASCADE-OVERVIEW

  - id: S-CASCADE-V2-FUNC-1
    type: goal
    text: Проверять соответствие L1 идеям L0 (детализация корректна)
    part_of: S-CASCADE-VALIDATOR-PHASE-2

  - id: S-CASCADE-V2-FUNC-2
    type: goal
    text: Проверять соответствие L2 идеям L1
    part_of: S-CASCADE-VALIDATOR-PHASE-2

  - id: S-CASCADE-V2-FUNC-3
    type: goal
    text: Проверять соответствие L3 идеям L2
    part_of: S-CASCADE-VALIDATOR-PHASE-2

  - id: S-CASCADE-V2-FUNC-4
    type: goal
    text: Проверять соответствие L4 идеям L3
    part_of: S-CASCADE-VALIDATOR-PHASE-2

  - id: S-CASCADE-V2-FUNC-5
    type: goal
    text: Проверять соответствие кода contract (types, signatures)
    part_of: S-CASCADE-VALIDATOR-PHASE-2

  - id: S-CASCADE-V2-FUNC-6
    type: goal
    text: Искать разрывы логики (идеи без связи с родителями)
    part_of: S-CASCADE-VALIDATOR-PHASE-2

  - id: S-CASCADE-V2-FUNC-7
    type: goal
    text: temperature=0 для детерминизма
    part_of: S-CASCADE-VALIDATOR-PHASE-2

  - id: S-CASCADE-V2-FUNC-8
    type: goal
    text: Кэширование по хэшу входа
    part_of: S-CASCADE-VALIDATOR-PHASE-2

  - id: S-CASCADE-GAP-ANALYZER
    type: component
    text: Gap Analyzer — поиск недостающих уровней каскада
    part_of: S-CASCADE-OVERVIEW

  - id: S-CASCADE-GAP-FUNC-1
    type: goal
    text: Находить L0 без L1
    part_of: S-CASCADE-GAP-ANALYZER

  - id: S-CASCADE-GAP-FUNC-2
    type: goal
    text: Находить L1 без L2
    part_of: S-CASCADE-GAP-ANALYZER

  - id: S-CASCADE-GAP-FUNC-3
    type: goal
    text: Находить L2 без L3
    part_of: S-CASCADE-GAP-ANALYZER

  - id: S-CASCADE-GAP-FUNC-4
    type: goal
    text: Находить L3 без L4
    part_of: S-CASCADE-GAP-ANALYZER

  - id: S-CASCADE-GAP-FUNC-5
    type: goal
    text: Генерировать список задач для заполнения gaps
    part_of: S-CASCADE-GAP-ANALYZER

  - id: S-CASCADE-IMPACT-ANALYZER
    type: component
    text: Impact Analyzer — анализ влияния изменений
    part_of: S-CASCADE-OVERVIEW

  - id: S-CASCADE-IMPACT-FUNC-1
    type: goal
    text: При изменении L0 находить все затронутые L1-L4
    part_of: S-CASCADE-IMPACT-ANALYZER

  - id: S-CASCADE-IMPACT-FUNC-2
    type: goal
    text: При изменении L1 находить все затронутые L2-L4
    part_of: S-CASCADE-IMPACT-ANALYZER

  - id: S-CASCADE-IMPACT-FUNC-3
    type: goal
    text: Маркировать зависимые уровни как invalidated
    part_of: S-CASCADE-IMPACT-ANALYZER

  - id: S-CASCADE-CONFIG
    type: component
    text: Configuration — чтение exodus.yaml
    part_of: S-CASCADE-OVERVIEW

  - id: S-CASCADE-CONFIG-FUNC-1
    type: goal
    text: Находить exodus.yaml в корне проекта
    part_of: S-CASCADE-CONFIG

  - id: S-CASCADE-CONFIG-FUNC-2
    type: goal
    text: Читать поле vision (путь к L0)
    part_of: S-CASCADE-CONFIG

  - id: S-CASCADE-CONFIG-FUNC-3
    type: goal
    text: Выдавать ошибку если vision не указан
    part_of: S-CASCADE-CONFIG

  - id: S-CASCADE-ERROR-HANDLING
    type: component
    text: Error Handling — структурированные ошибки валидации
    part_of: S-CASCADE-OVERVIEW

  - id: S-CASCADE-ERROR-1
    type: goal
    text: Ошибка — duplicate_id (дубликат идентификатора)
    part_of: S-CASCADE-ERROR-HANDLING

  - id: S-CASCADE-ERROR-2
    type: goal
    text: Ошибка — dangling_reference (висячая ссылка)
    part_of: S-CASCADE-ERROR-HANDLING

  - id: S-CASCADE-ERROR-3
    type: goal
    text: Ошибка — cycle_detected (цикл в графе)
    part_of: S-CASCADE-ERROR-HANDLING

  - id: S-CASCADE-ERROR-4
    type: goal
    text: Ошибка — orphan_idea (идея без связей)
    part_of: S-CASCADE-ERROR-HANDLING

  - id: S-CASCADE-ERROR-5
    type: goal
    text: Ошибка — invalid_type (недопустимый тип идеи)
    part_of: S-CASCADE-ERROR-HANDLING

  - id: S-CASCADE-ERROR-6
    type: goal
    text: Ошибка — invalid_link (недопустимый тип связи)
    part_of: S-CASCADE-ERROR-HANDLING

  - id: S-CASCADE-ERROR-7
    type: goal
    text: Ошибка — level_skip (пропуск уровня)
    part_of: S-CASCADE-ERROR-HANDLING

  - id: S-CASCADE-ERROR-8
    type: goal
    text: Ошибка — missing_alternatives (decision без alternatives)
    part_of: S-CASCADE-ERROR-HANDLING

  - id: S-CASCADE-ERROR-9
    type: goal
    text: Ошибка — multiple_selected (несколько selected в decision)
    part_of: S-CASCADE-ERROR-HANDLING

  - id: S-CASCADE-ERROR-10
    type: goal
    text: Ошибка — missing_rejected_because (нет rejected_because у невыбранной альтернативы)
    part_of: S-CASCADE-ERROR-HANDLING

  - id: S-CASCADE-ERROR-11
    type: goal
    text: Ошибка — missing_part_of (component без part_of)
    part_of: S-CASCADE-ERROR-HANDLING

  - id: S-CASCADE-ERROR-12
    type: goal
    text: Ошибка — config_missing_vision (в exodus.yaml не указан vision)
    part_of: S-CASCADE-ERROR-HANDLING
