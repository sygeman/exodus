ideas:
  - id: CODE-CASCADE-OVERVIEW
    type: component
    text: Реализация Exodus Cascade Engine — код, тесты, конфигурации
    implements: C-CASCADE-OVERVIEW

  - id: CODE-CASCADE-PATH
    type: component
    text: ./cascade — директория реализации (создаётся при dogfooding)
    part_of: CODE-CASCADE-OVERVIEW

  - id: CODE-CASCADE-COMP-PARSER
    type: component
    text: YAML Parser — src/parser.ts. Использует yaml library. Парсит meta и ideas.
    part_of: CODE-CASCADE-OVERVIEW
    implements: C-CASCADE-API-LOAD

  - id: CODE-CASCADE-COMP-GRAPH
    type: component
    text: Graph Builder — src/graph.ts. Строит граф в памяти. Поддерживает обход вверх/вниз.
    part_of: CODE-CASCADE-OVERVIEW
    implements: C-CASCADE-API-GRAPH

  - id: CODE-CASCADE-COMP-VALIDATOR-1
    type: component
    text: Validator Phase 1 — src/validator/phase1.ts. Механические проверки.
    part_of: CODE-CASCADE-OVERVIEW
    implements: C-CASCADE-API-VALIDATE

  - id: CODE-CASCADE-COMP-VALIDATOR-2
    type: component
    text: Validator Phase 2 — src/validator/phase2.ts. LLM семантическая валидация.
    part_of: CODE-CASCADE-OVERVIEW
    implements: C-CASCADE-API-VALIDATE

  - id: CODE-CASCADE-COMP-GAP-ANALYZER
    type: component
    text: Gap Analyzer — src/gap-analyzer.ts. Находит недостающие уровни.
    part_of: CODE-CASCADE-OVERVIEW
    implements: C-CASCADE-API-GAPS

  - id: CODE-CASCADE-COMP-IMPACT-ANALYZER
    type: component
    text: Impact Analyzer — src/impact-analyzer.ts. Анализ влияния изменений.
    part_of: CODE-CASCADE-OVERVIEW
    implements: C-CASCADE-API-IMPACT

  - id: CODE-CASCADE-COMP-API
    type: component
    text: HTTP API Server — src/index.ts. Elysia framework. Реализует все endpoints.
    part_of: CODE-CASCADE-OVERVIEW
    implements: [C-CASCADE-API-LOAD, C-CASCADE-API-VALIDATE, C-CASCADE-API-GRAPH, C-CASCADE-API-GAPS, C-CASCADE-API-IMPACT, C-CASCADE-API-TRACE, C-CASCADE-API-IDEA, C-CASCADE-API-HEALTH]

  - id: CODE-CASCADE-COMP-TYPES
    type: component
    text: TypeScript Types — src/types.ts. Cascade, Idea, Link, ValidationError, etc.
    part_of: CODE-CASCADE-OVERVIEW
    implements: [C-CASCADE-TYPES-CASCADE, C-CASCADE-TYPES-LEVEL, C-CASCADE-TYPES-IDEA-TYPE, C-CASCADE-TYPES-LINK-TYPE]

  - id: CODE-CASCADE-COMP-CONFIG
    type: component
    text: Config Reader — src/config.ts. Читает exodus.yaml.
    part_of: CODE-CASCADE-OVERVIEW

  - id: CODE-CASCADE-COMP-ERRORS
    type: component
    text: Error Definitions — src/errors.ts. Все коды ошибок и сообщения.
    part_of: CODE-CASCADE-OVERVIEW
    implements: C-CASCADE-ERROR-CODES

  - id: CODE-CASCADE-TEST-UNIT
    type: component
    text: Unit tests — tests/*.test.ts. Bun test runner.
    part_of: CODE-CASCADE-OVERVIEW

  - id: CODE-CASCADE-TEST-INTEGRATION
    type: component
    text: Integration tests — tests/integration/*.test.ts. Тесты с реальными YAML.
    part_of: CODE-CASCADE-OVERVIEW

  - id: CODE-CASCADE-TEST-FIXTURES
    type: component
    text: Test fixtures — tests/fixtures/*.yaml. Примеры валидных и невалидных каскадов.
    part_of: CODE-CASCADE-OVERVIEW

  - id: CODE-CASCADE-DEP-RUNTIME
    type: component
    text: Bun runtime — package.json
    part_of: CODE-CASCADE-OVERVIEW

