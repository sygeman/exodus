    type: component
    text: TypeScript — tsconfig.json
    part_of: CODE-CASCADE-OVERVIEW

  - id: CODE-CASCADE-DEV-OXLINT
    type: component
    text: Oxlint — .oxlintrc.json
    part_of: CODE-CASCADE-OVERVIEW

