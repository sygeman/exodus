meta:
  level: L3
  type: contract
  id: exodus-contract-cascade
  derives_from: exodus-spec-cascade
  status: draft
  created: "2025-04-05"

ideas:
  - id: C-CASCADE-OVERVIEW
    type: component
    text: Контракты Exodus Cascade Engine — API для работы с каскадом
    implements: S-CASCADE-OVERVIEW

  - id: C-CASCADE-API-LOAD
    type: component
    text: |
      POST /cascade/load — загрузка каскада из директории
      Request: {
        project_path: string  // путь к корню проекта с exodus.yaml
      }
      Response: {
        success: boolean,
        cascade_id: string,
        levels: {
          L0: string[],  // ids файлов
          L1: string[],
          L2: string[],
          L3: string[],
          L4: string[]
        },
        error?: string
      }
    part_of: C-CASCADE-OVERVIEW
    implements: [S-CASCADE-PARSER, S-CASCADE-CONFIG]

  - id: C-CASCADE-API-VALIDATE
    type: component
    text: |
      POST /cascade/validate — валидация каскада
      Request: {
        cascade_id: string,
        phase: 1 | 2  // 1 = механическая, 2 = семантическая
      }
      Response: {
        success: boolean,
        valid: boolean,
        errors: ValidationError[],
        warnings: ValidationWarning[]
      }
      ValidationError: {
        code: string,      // duplicate_id, dangling_reference, cycle_detected, etc
        message: string,
        level: string,     // L0, L1, L2, L3, L4
        file?: string,
        idea_id?: string,
        details?: object
      }
    part_of: C-CASCADE-OVERVIEW
    implements: [S-CASCADE-VALIDATOR-PHASE-1, S-CASCADE-VALIDATOR-PHASE-2]

  - id: C-CASCADE-API-GRAPH
    type: component
    text: |
      GET /cascade/:cascade_id/graph — получение графа зависимостей
      Response: {
        nodes: GraphNode[],
        edges: GraphEdge[]
      }
      GraphNode: {
        id: string,
        type: string,      // goal, component, invariant, etc
        level: string,     // L0, L1, L2, L3, L4
        text: string,
        file: string
      }
      GraphEdge: {
        from: string,      // node id
        to: string,        // node id
        type: string       // implements, requires, part_of, supports, contradicts
      }
    part_of: C-CASCADE-OVERVIEW
    implements: S-CASCADE-GRAPH-BUILDER

  - id: C-CASCADE-API-GAPS
    type: component
    text: |
      GET /cascade/:cascade_id/gaps — поиск недостающих уровней
      Response: {
        gaps: Gap[],
        total: number
      }
      Gap: {
        from_level: string,    // L0, L1, L2, L3
        to_level: string,      // L1, L2, L3, L4
        parent_id: string,     // id идеи в from_level
        parent_text: string,
        suggested_task: string
      }
    part_of: C-CASCADE-OVERVIEW
    implements: S-CASCADE-GAP-ANALYZER

  - id: C-CASCADE-API-IMPACT
    type: component
    text: |
      POST /cascade/:cascade_id/impact — анализ влияния изменения
      Request: {
        idea_id: string,       // id изменяемой идеи
        change_type: string    // modify, delete
      }
      Response: {
        affected: AffectedIdea[]
      }
      AffectedIdea: {
        id: string,
        level: string,
        text: string,
        reason: string,        // почему затронута
        action_required: string
      }
    part_of: C-CASCADE-OVERVIEW
    implements: S-CASCADE-IMPACT-ANALYZER

  - id: C-CASCADE-API-TRACE
    type: component
    text: |
      GET /cascade/:cascade_id/trace/:idea_id — трассировка до L0
      Response: {
        path: TraceNode[]      // цепочка от idea_id до L0
      }
      TraceNode: {
        id: string,
        level: string,
        text: string,
        link_type: string      // как связано с предыдущим
      }
    part_of: C-CASCADE-OVERVIEW

  - id: C-CASCADE-API-IDEA
    type: component
    text: |
      GET /cascade/:cascade_id/idea/:idea_id — получение идеи
      Response: {
        id: string,
        type: string,
        level: string,
        text: string,
        file: string,
        links: {
          implements?: string[],
          requires?: string[],
          part_of?: string[],
          supports?: string[],
          contradicts?: string[]
        },
        implemented_by?: string[],  // обратные связи
        required_by?: string[],
        part_of_container?: string,
        supported_by?: string[],
        contradicted_by?: string[]
      }
    part_of: C-CASCADE-OVERVIEW

  - id: C-CASCADE-API-HEALTH
    type: component
    text: |
      GET /cascade/health — проверка доступности сервиса
      Response: {
        status: "ok" | "degraded" | "error",
        version: string,
        uptime: number
      }
    part_of: C-CASCADE-OVERVIEW

  - id: C-CASCADE-TYPES-CASCADE
    type: component
    text: |
      Cascade — загруженный каскад
      {
        id: string,
        project_path: string,
        vision_file: string,
        levels: Map<Level, File[]>,
        graph: Graph,
        loaded_at: timestamp
      }
    part_of: C-CASCADE-OVERVIEW

  - id: C-CASCADE-TYPES-LEVEL
    type: component
    text: |
      Level — уровень каскада
      "L0" | "L1" | "L2" | "L3" | "L4"
    part_of: C-CASCADE-OVERVIEW

  - id: C-CASCADE-TYPES-IDEA-TYPE
    type: component
    text: |
      IdeaType — тип идеи
      "goal" | "non_goal" | "constraint" | "invariant" | "component" | "decision" | "principle"
    part_of: C-CASCADE-OVERVIEW

  - id: C-CASCADE-TYPES-LINK-TYPE
    type: component
    text: |
      LinkType — тип связи
      "implements" | "requires" | "part_of" | "supports" | "contradicts"
    part_of: C-CASCADE-OVERVIEW

  - id: C-CASCADE-ERROR-CODES
    type: component
    text: |
      Коды ошибок валидации:
      - duplicate_id: Дубликат идентификатора
      - dangling_reference: Висячая ссылка
      - cycle_detected: Цикл в графе
      - orphan_idea: Идея без связей
      - invalid_idea_type: Недопустимый тип идеи
      - invalid_link_type: Недопустимый тип связи
      - level_skip: Пропуск уровня
      - missing_alternatives: Decision без alternatives
      - multiple_selected: Несколько selected в decision
      - missing_rejected_because: Нет rejected_because
      - missing_part_of: Component без part_of
      - config_missing_vision: Не указан vision в exodus.yaml
      - file_not_found: YAML файл не найден
      - parse_error: Ошибка парсинга YAML
    part_of: C-CASCADE-OVERVIEW
