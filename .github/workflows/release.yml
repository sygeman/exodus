name: Release
on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to build and release (e.g., v0.0.3)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  changelog:
    name: Generate Changelog
    timeout-minutes: 15
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.changelog.outputs.version }}
      release_notes: ${{ steps.changelog.outputs.clean_changelog }}
      tag: ${{ steps.changelog.outputs.tag }}
      bumped: ${{ steps.check-bump.outputs.bumped }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Changelog
        id: changelog
        uses: TriPSs/conventional-changelog-action@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          version-file: "./apps/exodus/package.json"
          version-path: "version"
          skip-version-file: false
          skip-commit: false
          skip-tag: false
          skip-git-pull: true
          create-summary: true

      - name: Check if version was bumped
        id: check-bump
        run: |
          TAG="v${{ steps.changelog.outputs.version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "bumped=true" >> "$GITHUB_OUTPUT"
          else
            echo "bumped=false" >> "$GITHUB_OUTPUT"
          fi

  build-macos:
    name: Build macOS
    needs: changelog
    if: needs.changelog.outputs.bumped == 'true' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 15
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || format('v{0}', needs.changelog.outputs.version) }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun install cache
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-cache-${{ hashFiles('bun.lockb', 'bun.lock', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-cache-

      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('bun.lockb', 'bun.lock', 'package.json', 'apps/exodus/package.json') }}

      - name: Cache turbo build setup
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Cache electrobun previous bundle
        uses: actions/cache@v5
        with:
          path: ~/Library/Application Support/exodus.sgmn.dev/stable/self-extraction
          key: ${{ runner.os }}-electrobun-self-extraction-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-electrobun-self-extraction-

      - name: Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build:stable

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: macos-artifacts
          path: apps/exodus/artifacts/**
          if-no-files-found: error

  build-linux-x64:
    name: Build Linux x64
    needs: changelog
    if: needs.changelog.outputs.bumped == 'true' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || format('v{0}', needs.changelog.outputs.version) }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun install cache
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-cache-${{ hashFiles('bun.lockb', 'bun.lock', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-cache-

      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('bun.lockb', 'bun.lock', 'package.json', 'apps/exodus/package.json') }}

      - name: Cache turbo build setup
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Cache electrobun previous bundle
        uses: actions/cache@v5
        with:
          path: ~/.local/share/exodus.sgmn.dev/stable/self-extraction
          key: ${{ runner.os }}-electrobun-self-extraction-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-electrobun-self-extraction-

      - name: Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build:stable

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: linux-x64-artifacts
          path: apps/exodus/artifacts/**
          if-no-files-found: error

  build-linux-arm64:
    name: Build Linux ARM64
    needs: changelog
    if: needs.changelog.outputs.bumped == 'true' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 15
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || format('v{0}', needs.changelog.outputs.version) }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun install cache
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-arm64-bun-cache-${{ hashFiles('bun.lockb', 'bun.lock', 'package.json', 'apps/exodus/package.json') }}
          restore-keys: |
            ${{ runner.os }}-arm64-bun-cache-

      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-arm64-node-modules-${{ hashFiles('bun.lockb', 'bun.lock', 'package.json', 'apps/exodus/package.json') }}

      - name: Cache turbo build setup
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-arm64-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-arm64-turbo-

      - name: Cache electrobun previous bundle
        uses: actions/cache@v5
        with:
          path: ~/.local/share/exodus.sgmn.dev/stable/self-extraction
          key: ${{ runner.os }}-arm64-electrobun-self-extraction-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-arm64-electrobun-self-extraction-

      - name: Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build:stable

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: linux-arm64-artifacts
          path: apps/exodus/artifacts/**
          if-no-files-found: error

  release:
    name: Create Release
    needs: [changelog, build-macos, build-linux-x64, build-linux-arm64]
    if: needs.changelog.outputs.bumped == 'true' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v8
        with:
          name: macos-artifacts
          path: release-assets

      - name: Download Linux x64 artifacts
        uses: actions/download-artifact@v8
        with:
          name: linux-x64-artifacts
          path: release-assets

      - name: Download Linux ARM64 artifacts
        uses: actions/download-artifact@v8
        with:
          name: linux-arm64-artifacts
          path: release-assets

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || format('v{0}', needs.changelog.outputs.version) }}
          name: Release ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || format('v{0}', needs.changelog.outputs.version) }}
          body: ${{ github.event_name == 'workflow_dispatch' && format('Manual release for {0}', github.event.inputs.version) || needs.changelog.outputs.release_notes }}
          draft: false
          prerelease: false
          files: |
            release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
