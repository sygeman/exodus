name: Release
on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to build and release (e.g., v0.0.3)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.changelog.outputs.version }}
      release_notes: ${{ steps.changelog.outputs.clean_changelog }}
      tag: ${{ steps.changelog.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Changelog
        id: changelog
        uses: TriPSs/conventional-changelog-action@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          version-file: "./package.json"
          version-path: "version"
          skip-version-file: false
          skip-commit: false
          skip-tag: false
          skip-git-pull: true
          create-summary: true

  build-web:
    name: Build Web (Vite)
    needs: changelog
    if: needs.changelog.outputs.version != '' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || format('v{0}', needs.changelog.outputs.version) }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('bun.lockb', 'bun.lock', 'package.json') }}

      - name: Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: bun install --frozen-lockfile

      - name: Build web
        run: bun run build

      - name: Upload web artifacts
        uses: actions/upload-artifact@v7
        with:
          name: web-dist
          path: dist/
          if-no-files-found: error

  build-macos:
    name: Build macOS
    needs: [changelog, build-web]
    if: needs.changelog.outputs.version != '' || github.event_name == 'workflow_dispatch'
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || format('v{0}', needs.changelog.outputs.version) }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('bun.lockb', 'bun.lock', 'package.json') }}

      - name: Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: bun install --frozen-lockfile

      - name: Download web artifacts
        uses: actions/download-artifact@v8
        with:
          name: web-dist
          path: dist

      - name: Build app
        run: bunx electrobun build --env=stable

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: macos-artifacts
          path: artifacts/**
          if-no-files-found: error

  build-linux:
    name: Build Linux
    needs: [changelog, build-web]
    if: needs.changelog.outputs.version != '' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || format('v{0}', needs.changelog.outputs.version) }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('bun.lockb', 'bun.lock', 'package.json') }}

      - name: Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: bun install --frozen-lockfile

      - name: Download web artifacts
        uses: actions/download-artifact@v8
        with:
          name: web-dist
          path: dist

      - name: Build app
        run: bunx electrobun build --env=stable

      - name: Copy Linux installer script
        run: cp scripts/install-linux.sh artifacts/install-linux.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: linux-artifacts
          path: artifacts/**
          if-no-files-found: error

  release:
    name: Create Release
    needs: [changelog, build-macos, build-linux]
    if: needs.changelog.outputs.version != '' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v8
        with:
          name: macos-artifacts
          path: release-assets

      - name: Download Linux artifacts
        uses: actions/download-artifact@v8
        with:
          name: linux-artifacts
          path: release-assets

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || format('v{0}', needs.changelog.outputs.version) }}
          name: Release ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || format('v{0}', needs.changelog.outputs.version) }}
          body: ${{ github.event_name == 'workflow_dispatch' && format('Manual release for {0}', github.event.inputs.version) || needs.changelog.outputs.release_notes }}
          draft: false
          prerelease: false
          files: |
            release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
