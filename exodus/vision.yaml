meta:
  level: L0
  type: vision
  id: exodus-vision
  status: draft
  created: "2025-01-01"

ideas:
  - id: V-PURPOSE
    type: goal
    text: Система Exodus существует для того, чтобы превратить хаотичные идеи в структурированный продукт через контролируемую эволюцию с сохранением контекста для разработчиков и продуктовых команд, использующих AI

  - id: V-VALUE-01
    type: goal
    text: Обеспечить продуктовую эволюцию от идеи до кода без потери контекста между итерациями

  - id: V-01
    type: goal
    text: Превращать хаотичные мысли и обсуждения в стабилизированное намерение через процесс Discovery
    supports: [V-VALUE-01]

  - id: V-02
    type: goal
    text: Детализировать намерение через Exodus Cascade от Vision (L0) до Code (L4)
    requires: [V-01]
    supports: [V-VALUE-01]

  - id: V-CASCADE
    type: goal
    text: Использовать Exodus Cascade — систему каскадной детализации с 5 уровнями (Vision, Design, Spec, Contract, Code), 7 типами идей и 5 типами связей
    requires: [V-02]
    supports: [V-06, SC-05]

  - id: V-03
    type: goal
    text: Выполнять задачи в изолированном runtime с ограниченным контекстом и наборами skills
    requires: [V-02]

  - id: V-04
    type: goal
    text: Сохранять целостность состояния продукта через git как единственный источник правды
    requires: [V-02]
    supports: [V-VALUE-01]

  - id: V-05
    type: goal
    text: Отслеживать эволюцию продукта без потери контекста между итерациями
    requires: [V-04]
    supports: [V-VALUE-01]

  - id: V-06
    type: goal
    text: Валидировать изменения сквозной цепочкой от Implementation до Vision
    requires: [V-02, V-05]

  - id: INV-01
    type: invariant
    text: Намерение должно быть стабилизировано перед началом планирования в Control
    supports: [V-01, V-02]

  - id: INV-02
    type: invariant
    text: Код не может быть изменён напрямую — только через каскад
    supports: [V-06]

  - id: INV-03
    type: invariant
    text: Execution не имеет доступа к Control или глобальному State
    supports: [V-03]

  - id: INV-04
    type: invariant
    text: Каждое изменение должно трассироваться до Vision (L0)
    supports: [V-05, V-06]

  - id: INV-05
    type: invariant
    text: State не изменяется напрямую — только через Control → Execution → State
    supports: [V-04]

  - id: INV-06
    type: invariant
    text: Изменение на уровне N автоматически инвалидирует все зависимые уровни N+1
    supports: [V-02, V-05]

  - id: AP-01
    type: principle
    text: Модульность — система состоит из независимых слоёв (Intent/Control/Execution/State/UI/Infra)
    supports: [V-02, V-06]

  - id: AP-02
    type: principle
    text: Контрактно-ориентированные интерфейсы — модули взаимодействуют только через явные контракты
    supports: [AP-01]

  - id: AP-03
    type: principle
    text: Стабилизация перед выполнением — никаких действий без фиксированного намерения
    supports: [INV-01]

  - id: AP-04
    type: principle
    text: Изоляция на уровне задач — каждая задача работает в своём sandbox
    supports: [V-03, INV-03]

  - id: AP-05
    type: principle
    text: Git как единственный источник состояния — вся история и артефакты в git
    supports: [V-04, INV-05]

  - id: AP-06
    type: principle
    text: Трассируемость — любой артефакт можно отследить до исходного намерения
    supports: [V-05, V-06, INV-04]

  - id: INV-07
    type: invariant
    text: Все артефакты Exodus Cascade хранятся в чистом YAML — машинная читаемость приоритет
    supports: [V-CASCADE]

  - id: INV-08
    type: invariant
    text: Каждая идея в Exodus Cascade должна иметь хотя бы одну связь
    supports: [V-CASCADE]

  - id: AP-07
    type: principle
    text: Строгая валидация — орфаны, циклы, противоречия, висячие ссылки = error
    supports: [V-CASCADE, V-06]

  - id: AP-08
    type: principle
    text: Двухфазная валидация — механическая (целостность графа) + семантическая (LLM)
    supports: [V-CASCADE, V-06]

  - id: AP-09
    type: principle
    text: Ни один артефакт не фиксируется без подтверждения человека
    supports: [V-CASCADE, AP-03]

  - id: NG-01
    type: non_goal
    text: Не является генератором кода "из коробки" без контекста продукта
    contradicts: [V-03]

  - id: NG-02
    type: non_goal
    text: Не заменяет команду разработчиков — это инструмент для разработчиков

  - id: NG-03
    type: non_goal
    text: Не универсальное решение для всех типов продуктов — фокус на software продукты

  - id: NG-04
    type: non_goal
    text: Не реализует собственную систему контроля версий — использует git
    supports: [AP-05]

  - id: NG-05
    type: non_goal
    text: Не предоставляет real-time коллаборацию множества пользователей

  - id: SC-01
    type: goal
    text: Можно создать проект, не открывая файлы вручную — только через диалог с системой
    supports: [V-01, V-02]

  - id: SC-02
    type: goal
    text: Любое изменение трассируется от кода до Vision через явные ссылки
    supports: [V-06, INV-04]

  - id: SC-03
    type: goal
    text: Валидация проходит сквозную цепочку от Implementation до Vision
    supports: [V-06]

  - id: SC-04
    type: goal
    text: Execution работает в изолированном runtime без доступа к глобальному состоянию
    supports: [V-03, INV-03]

  - id: SC-05
    type: goal
    text: Система может развивать саму себя (dogfooding) — создавать компоненты Exodus через Exodus
    supports: [V-02, V-06]

  - id: SC-06
    type: goal
    text: Контекст не теряется между итерациями — история изменений сохраняется
    supports: [V-05]

  - id: SC-07
    type: goal
    text: Изменение Vision автоматически пересобирает затронутые ветви каскада
    supports: [V-02, INV-06]

  - id: ACTOR-DEV
    type: component
    text: Developer — формулирует намерения, оценивает результаты, принимает решения
    supports: [V-01]

  - id: ACTOR-AI
    type: component
    text: AI Agent — исполнитель в изолированном runtime, генерирует артефакты
    supports: [V-03]

  - id: ACTOR-SYS
    type: component
    text: System — внешние сервисы и инфраструктура (Git, БД, API)
    supports: [V-04]
