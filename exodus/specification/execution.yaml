meta:
  level: L2
  type: specification
  id: exodus-spec-execution
  derives_from: exodus-design-execution
  status: active
  created: "2025-01-15"

ideas:
  - id: S-EXEC-OVERVIEW
    type: component
    text: Спецификация Execution Layer — изолированный слой выполнения задач через AI-агентов
    implements: D-EXEC-OVERVIEW

  - id: S-EXEC-FUNC-01
    type: goal
    text: Принимать задачи от Control через HTTP API
    part_of: S-EXEC-OVERVIEW

  - id: S-EXEC-FUNC-02
    type: goal
    text: Выполнять задачи в изолированном sandbox runtime
    part_of: S-EXEC-OVERVIEW

  - id: S-EXEC-FUNC-03
    type: goal
    text: Интегрироваться с AI-провайдерами через ACP протокол
    part_of: S-EXEC-OVERVIEW

  - id: S-EXEC-FUNC-04
    type: goal
    text: Отправлять результаты через callback механизм
    part_of: S-EXEC-OVERVIEW

  - id: S-EXEC-FUNC-05
    type: goal
    text: Поддерживать streaming chunks для длительных операций
    part_of: S-EXEC-OVERVIEW

  - id: S-EXEC-CONSTRAINT-01
    type: constraint
    text: Runtime — Bun/Node.js
    part_of: S-EXEC-OVERVIEW

  - id: S-EXEC-CONSTRAINT-02
    type: constraint
    text: HTTP Framework — Elysia
    part_of: S-EXEC-OVERVIEW

  - id: S-EXEC-CONSTRAINT-03
    type: constraint
    text: Protocol — ACP (Agent Communication Protocol)
    part_of: S-EXEC-OVERVIEW

  - id: S-EXEC-INV-01
    type: invariant
    text: Не имеет доступа к Control
    part_of: S-EXEC-OVERVIEW

  - id: S-EXEC-INV-02
    type: invariant
    text: Не имеет доступа к глобальному State
    part_of: S-EXEC-OVERVIEW

  - id: S-EXEC-INV-03
    type: invariant
    text: Не сохраняет память между запусками
    part_of: S-EXEC-OVERVIEW

  - id: S-EXEC-INV-04
    type: invariant
    text: Работает только с разрешёнными skills
    part_of: S-EXEC-OVERVIEW
