id: exodus-implementation-execution
level: implementation
parent_id: exodus-design-execution
status: active
created: "2025-01-15"

purpose: |
  Изолированный слой выполнения задач через AI-агентов.
  Получает Task от Control, выполняет в sandbox, возвращает результат.

covers:
  - exodus-design-execution

implementation:
  path: ./execution
  runtime: bun
  framework: elysia
  
components:
  - id: api
    name: HTTP API
    path: src/index.ts
    purpose: Приём задач через POST /execute
    
  - id: worker
    name: Task Worker
    path: src/services/worker.ts
    purpose: Выполнение задач через OpenCode ACP
    
  - id: opencode
    name: OpenCode Executor
    path: src/services/opencode.ts
    purpose: Интеграция с opencode CLI через ACP протокол
    
  - id: callback
    name: Callback Service
    path: src/services/callback.ts
    purpose: Отправка результатов в Control
    
  - id: validation
    name: Validation Utils
    path: src/utils/validation.ts
    purpose: Валидация входных данных

invariants:
  - id: INV-EXEC-01
    text: Не имеет доступа к Control
  - id: INV-EXEC-02
    text: Не имеет доступа к глобальному State
  - id: INV-EXEC-03
    text: Не сохраняет память между запусками
  - id: INV-EXEC-04
    text: Работает только с разрешёнными skills

interfaces:
  input:
    method: POST
    endpoint: /execute
    format: json
    fields:
      - task_id
      - command
      - callback_url
      - working_dir
      - model
      - role_prompt
      
  output:
    method: POST
    endpoint: callback_url
    format: json
    fields:
      - task_id
      - status
      - result
      - error
      - exit_code

tests:
  unit: tests/*.test.ts
  integration: tests/integration/*.test.ts

dependencies:
  runtime: bun
  packages:
    - elysia
  dev_packages:
    - oxlint
    - prettier
    - typescript
