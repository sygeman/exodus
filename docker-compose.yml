version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: exodus
      POSTGRES_PASSWORD: exodus
      POSTGRES_DB: exodus_control
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U exodus"]
      interval: 5s
      timeout: 5s
      retries: 5

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    volumes:
      - ./ui:/app

  intent:
    build:
      context: ./intent
      dockerfile: Dockerfile
    volumes:
      - ./intent:/app

  control:
    build:
      context: ./control
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./control:/app
      - projects_data:/data/projects
    environment:
      - PORT=8080
      - DATABASE_URL=postgresql://exodus:exodus@postgres:5432/exodus_control
      - PROJECTS_PATH=/data/projects
    depends_on:
      postgres:
        condition: service_healthy

  execution:
    build:
      context: ./execution
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    volumes:
      - ./execution:/app
    environment:
      - PORT=8081
      - KIMI_API_KEY=${KIMI_API_KEY}

  state:
    build:
      context: ./state
      dockerfile: Dockerfile
    volumes:
      - ./state:/app

  infra:
    build:
      context: ./infra
      dockerfile: Dockerfile
    volumes:
      - ./infra:/app

volumes:
  postgres_data:
  projects_data:
